|CUSTOM1|
|?DOCROOT=`HOME`/domains/`DOMAIN`/private_html|
|?REALDOCROOT=`HOME`/domains/`DOMAIN`/private_html|

|?HOST_DOMAIN=`DOMAIN`|
|*if HOST_POINTER|
|?HOST_DOMAIN=`HOST_POINTER`|
|*endif|

|?OBDP1=|
|*if PHP1_RELEASE!="0"|
|?OBDP1=:/usr/local/php`PHP1_RELEASE`/lib/php/|
|*endif|
|?OBDP2=|

|?OPEN_BASEDIR_PATH=`HOME`/:/tmp:/var/tmp:/opt/alt/php`PHP1_RELEASE`/usr/share/pear/:/dev/urandom:/usr/local/lib/php/`OBDP1`|

|?FASTCGI_OPENBASEDIR=|
|*if OPEN_BASEDIR_ENABLED="ON"|
|?FASTCGI_OPENBASEDIR=-d open_basedir="`OPEN_BASEDIR_PATH`"|
|*endif|

|?PHP_MAIL_LOG=|
|?CLI_PHP_MAIL_LOG=|
|*if PHP_MAIL_LOG_ENABLED="1"|
|?PHP_MAIL_LOG=-d mail.log="`PHP_MAIL_LOG_DIR`/php-mail.log"|
|?CLI_PHP_MAIL_LOG=php_admin_value mail.log `PHP_MAIL_LOG_DIR`/php-mail.log|
|*endif|

|?PHP_EMAIL=`USER`@`DOMAIN`|
|?FASTCGI_SENDMAIL_FROM=-d sendmail_from="`PHP_EMAIL`"|

|?ALLOW_OVERRIDE=AllowOverride AuthConfig FileInfo Indexes Limit Options=Indexes,IncludesNOEXEC,MultiViews,SymLinksIfOwnerMatch,FollowSymLinks,None|
|?COMBINED_LOG=combined|

<VirtualHost |IP|:|PORT_443| |MULTI_IP|>
|CUSTOM|
|?SDOCROOT=`DOCROOT`/`SUB`|
|?CGI=ScriptAlias /cgi-bin/ "`SDOCROOT`/cgi-bin/"|
	SSLEngine on
	SSLCertificateFile |CERT|
	SSLCertificateKeyFile |KEY|
	|CAROOT|	

	ServerName www.|SUB|.|HOST_DOMAIN|
	ServerAlias www.|SUB|.|HOST_DOMAIN| |SUB|.|HOST_DOMAIN|
	ServerAdmin |ADMIN|
	DocumentRoot "|SDOCROOT|"
	|CGI|

	|USECANONICALNAME|

	|FORCE_SSL_REDIRECT|
|UNIT_PROXY|

	SuexecUserGroup |USER| |GROUP|

	CustomLog |APACHELOGDIR|/|DOMAIN|.|SUB|.bytes bytes
	CustomLog |APACHELOGDIR|/|DOMAIN|.|SUB|.log |COMBINED_LOG|
	ErrorLog |APACHELOGDIR|/|DOMAIN|.|SUB|.error.log

	|*if SUSPENDED_REASON|
	<IfModule mod_env.c>
		SetEnv reason "|SUSPENDED_REASON|"
	</IfModule>
	|*endif|

|CUSTOM2|
	<Directory "|SDOCROOT|">
|CUSTOM3|
|*if CGI=""|
		|ALLOW_OVERRIDE|
		Options -ExecCGI -Includes +IncludesNOEXEC
|*endif|
|*if HAVE_PHP1_FPM="1"|
		<FilesMatch "\.(inc|php|phtml|phps)$">
			<If "-f %{REQUEST_FILENAME}">
				#ProxyErrorOverride on
				<IfVersion = /^2.4.6[012]$/>
					ProxyFCGISetEnvIf "true" SCRIPT_FILENAME "%{unescape:%{SCRIPT_FILENAME}}"
				</IfVersion>
				AddHandler "proxy:unix:/usr/local/php|PHP1_RELEASE|/sockets/|USER|.sock|fcgi://localhost" .inc .php .phtml
			</If>
		</FilesMatch> 
		<FilesMatch "\.(php53|php54|php55|php56|php70|php71|php72|php73|php74|php80|php81|php82)$">
			Order Allow,Deny
			Deny from all
		</FilesMatch>
|*endif|

|*if HAVE_PHP1_FCGI="1"|
		<IfModule mod_fcgid.c>
			FCGIWrapper '/usr/local/safe-bin/fcgid|PHP1_RELEASE|.sh /usr/local/directadmin/data/users/|USER|/php/|DOMAIN|.ini |JAIL_TRUE_FALSE| |FASTCGI_SENDMAIL_FROM| |FASTCGI_OPENBASEDIR||FASTCGI_PHP_SETTINGS| |PHP_MAIL_LOG|' .php
			<FilesMatch "\.php$">
				SetHandler fcgid-script
				Options +ExecCGI
			</FilesMatch>
			<FilesMatch "\.(php53|php54|php55|php56|php70|php71|php72|php73|php74|php80|php81|php82)$">
				Order Allow,Deny
				Deny from all
			</FilesMatch>
		</IfModule>
|*endif|
|IF_MODULE_LITESPEED_OPEN|
|*if CLI="1"|
		php_admin_flag engine |PHP|
		php_admin_value sendmail_path '/usr/sbin/sendmail -t -i -f |PHP_EMAIL|'
		|CLI_PHP_MAIL_LOG|
		|CLI_PHP_SETTINGS|
|*endif|
|*if OPEN_BASEDIR="ON"|
		php_admin_value open_basedir |OPEN_BASEDIR_PATH|
|*endif|
|IF_MODULE_LITESPEED_CLOSE|
|*if HAVE_PHP1_CLI="1"|
		<FilesMatch "\.php$">
			AddHandler application/x-httpd-php|LSPHP1_RELEASE| .php
		</FilesMatch>
		<FilesMatch "\.(php53|php54|php55|php56|php70|php71|php72|php73|php74|php80|php81|php82)$">
			Order Allow,Deny
			Deny from all
		</FilesMatch>
|*endif|
	</Directory>
|MOD_SECURITY_RULES|

|*if USE_HOSTNAME_FOR_ALIAS="1"|
      RewriteEngine on
      RewriteOptions inherit
|*endif|

|*if WEBSERVER="litespeed"|
		<IfModule Litespeed>
			CacheRoot lscache
|BUBBLE_WRAP|
		</IfModule>
|*endif|

|*if AUTO_SECURITY_TXT="ON"|
    # Automatic security.txt (RFC 9116)
    ProxyPassMatch "^/\.well-known/security\.txt$" "unix:/usr/local/directadmin/shared/internal.sock|http://localhost"
|*endif|

|HANDLERS|
|MIMETYPES|
|HOTLINK_PROTECTION|
|CUSTOM4|
</VirtualHost>
