|?CACERT_LINE=|
|*if CACERT!=""|
|?CACERT_LINE=ssl_client_certificate `CACERT`;|
|*endif|
server {
	listen |IP|:|PORT_80| default_server;
	server_name _;
	root "|DOCROOT|";
	index index.html index.htm index.php;
|?php_is_needed=1|
|*if HAS_NGINX_PHP_CONF="yes"|
	|?php_is_needed=0|
	include /usr/local/directadmin/data/users/|USER|/nginx_php.conf;
|*endif|
|*if HAVE_NGINX_PROXY="1"|
	|?php_is_needed=0|
|*endif|
|*if php_is_needed="1"|
	location ~ \.php$
	{
		include /etc/nginx/webapps_settings.conf;
	}
|*endif|
	# deny access to apache .htaccess files
	location ~ /\.ht
	{
		deny all;
	}

	include /etc/nginx/webapps.conf;
}

server {
	listen |IP|:|PORT_443| ssl default_server;
	http2 on;
	server_name _;

	ssl_certificate      |CERT|;
	ssl_certificate_key  |KEY|;

	root "|DOCROOT|";
	index index.html index.htm index.php;

|?php_is_needed=1|
|*if HAS_NGINX_PHP_CONF="yes"|
	|?php_is_needed=0|
	include /usr/local/directadmin/data/users/|USER|/nginx_php.conf;
|*endif|
|*if HAVE_NGINX_PROXY="1"|
	|?php_is_needed=0|
|*endif|
|*if php_is_needed="1"|
	location ~ \.php$
	{
		include /etc/nginx/webapps_settings.conf;
	}
|*endif|
	# deny access to apache .htaccess files
	location ~ /\.ht
	{
		deny all;
	}

	include /etc/nginx/webapps.ssl.conf;
}
